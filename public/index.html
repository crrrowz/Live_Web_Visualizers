<body>

    <!-- Three.js renders here -->
    <canvas id="waveCanvas" aria-hidden="true"></canvas>

    <main id="main-content">

    <!-- Tap to start prompt -->
    <section id="tap-prompt" aria-label="بدء الجلسة">
        <h1>ابدأ جلسة الدراسة</h1>
        <p>اضغط في أي مكان لبدء التصوّر الصوتي</p>
    </section>

    <!-- Top bar: rec indicator + shape name -->
    <header id="top-bar" role="banner">
        <div id="rec-indicator" aria-live="polite">
            <div class="dot" aria-hidden="true"></div>
            <span>يستمع</span>
        </div>
        <div id="shape-name" aria-live="polite"></div>
    </header>

    <!-- Study HUD (heads-up display) -->
    <section id="study-hud" aria-label="لوحة الإحصائيات">
        <!-- Timer -->
        <div id="timer-box" role="timer">
            <div id="timer-label">مدة الجلسة</div>
            <time id="timer" aria-live="off">00:00:00</time>
        </div>

        <!-- Level & XP -->
        <div id="level-box">
            <div id="level-label">المستوى <span id="level-num">1</span></div>
            <div id="xp-bar-bg" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="شريط الخبرة"><div id="xp-bar-fill"></div></div>
            <div id="xp-text">0 / 100 XP</div>
        </div>

        <!-- Stats row -->
        <div id="stats-row">
            <div class="stat-item">
                <div class="stat-value" id="stat-sessions">0</div>
                <div class="stat-label">جلسات</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-total-time">0h</div>
                <div class="stat-label">إجمالي</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-streak">0🔥</div>
                <div class="stat-label">سلسلة</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-longest">0m</div>
                <div class="stat-label">أطول جلسة</div>
            </div>
        </div>
    </section>

    <!-- Motivational quote -->
    <aside id="quote-box" aria-label="اقتباس تحفيزي">
        <blockquote id="quote-text"></blockquote>
    </aside>

    <!-- Scene toggle button -->
    <nav id="scene-nav" aria-label="تحكم المشهد">
        <button id="scene-toggle" aria-label="تغيير المشهد">🔄 Solar System</button>
    </nav>

    <!-- Volume bar -->
    <div id="volume-bar" role="meter" aria-label="مستوى الصوت" aria-hidden="true"></div>

    <!-- Controls hint -->
    <footer id="controls-hint" aria-label="اختصارات لوحة المفاتيح">
        <kbd>Space نقرة = عكس الألوان</kbd>
        <kbd>Space مطوّل = الإحصائيات</kbd>
        <kbd>S = حفظ الجلسة</kbd>
        <kbd>R = إعادة تعيين</kbd>
        <kbd>T = تغيير المشهد</kbd>
    </footer>

    </main>

    <script type="module" src="/js/app.js"></script>
